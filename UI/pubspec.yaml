name: ui
description: Happenings Event Management mobile application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # API communication
  http: ^1.2.0

  # state management
  provider: ^6.1.2

  # secure JWT storage
  flutter_secure_storage: ^9.2.2

  # QR code for tickets
  qr_flutter: ^4.1.0

  # date formatting for events
  intl: ^0.19.0

  # loading indicator
  flutter_spinkit: ^5.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/